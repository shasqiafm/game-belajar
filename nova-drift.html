<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nova Drift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #0a0e1f;
    --bg-panel: #12172c;
    --nebula: #6c4ab6;
    --gold: #ffc857;
    --cyan: #4cd9e8;
    --text: #f2eee6;
    --text-dim: #8c93b0;
    --danger: #ff5d5d;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at 50% -10%, #1a1f3d 0%, var(--bg-deep) 55%);
    font-family:'Space Grotesk', sans-serif;
    color:var(--text);
    overflow:hidden;
    user-select:none;
  }
  #app{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage-wrap{
    position:relative;
    width:min(94vw, 480px);
    aspect-ratio: 9/16;
    max-height: 92vh;
    border-radius:18px;
    overflow:hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 30px 80px -20px rgba(108,74,182,0.5), inset 0 0 60px rgba(76,217,232,0.05);
    background: linear-gradient(180deg, #0d1230 0%, #080a17 100%);
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    touch-action:none;
  }
  .hud{
    position:absolute;
    top:14px; left:14px; right:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    z-index:5;
    pointer-events:none;
    font-family:'JetBrains Mono', monospace;
  }
  .hud .score{
    font-size:22px;
    font-weight:600;
    letter-spacing:0.5px;
    color:var(--gold);
    text-shadow: 0 0 16px rgba(255,200,87,0.4);
  }
  .hud .lives{
    display:flex;
    gap:6px;
  }
  .hud .life{
    width:14px; height:14px;
    border-radius:50%;
    background: var(--cyan);
    box-shadow: 0 0 8px var(--cyan);
  }
  .hud .life.lost{
    background: rgba(255,255,255,0.08);
    box-shadow:none;
  }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding: 32px 28px;
    z-index:10;
    background: rgba(8,10,23,0.78);
    backdrop-filter: blur(6px);
  }
  .overlay.hidden{ display:none; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--cyan);
    margin-bottom:10px;
  }
  h1{
    font-size:34px;
    margin:0 0 6px;
    font-weight:700;
    letter-spacing:-0.5px;
    background: linear-gradient(135deg, var(--gold), var(--cyan));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .desc{
    color:var(--text-dim);
    font-size:14px;
    line-height:1.5;
    max-width:280px;
    margin-bottom:22px;
  }
  .btn{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:15px;
    padding:13px 30px;
    border-radius:999px;
    border:none;
    background: linear-gradient(135deg, var(--gold), #ff9d57);
    color:#1a1206;
    cursor:pointer;
    box-shadow: 0 8px 24px -6px rgba(255,157,87,0.6);
    transition: transform 0.15s ease;
  }
  .btn:active{ transform: scale(0.96); }
  .btn.ghost{
    background:transparent;
    border:1px solid rgba(255,255,255,0.2);
    color:var(--text);
    box-shadow:none;
    margin-top:10px;
  }
  .final-score{
    font-family:'JetBrains Mono', monospace;
    font-size:46px;
    font-weight:600;
    color:var(--gold);
    margin: 4px 0 2px;
  }
  .final-label{
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:20px;
  }
  input[type=text]{
    font-family:'JetBrains Mono', monospace;
    background: var(--bg-panel);
    border:1px solid rgba(255,255,255,0.15);
    color:var(--text);
    padding:11px 14px;
    border-radius:10px;
    font-size:14px;
    text-align:center;
    width:200px;
    margin-bottom:12px;
    outline:none;
  }
  input[type=text]:focus{ border-color: var(--cyan); }
  .board{
    width:100%;
    max-width:280px;
    margin-top:6px;
    text-align:left;
  }
  .board-title{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:8px;
    text-align:center;
  }
  .board-row{
    display:flex;
    justify-content:space-between;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    padding:7px 12px;
    border-radius:8px;
    margin-bottom:4px;
    background: rgba(255,255,255,0.03);
  }
  .board-row.top{
    background: rgba(255,200,87,0.08);
    color: var(--gold);
  }
  .board-row .rank{ color: var(--text-dim); width:20px; }
  .board-row.top .rank{ color: var(--gold); }
  .ad-slot{
    position:absolute;
    bottom:0; left:0; right:0;
    height:52px;
    background: rgba(255,255,255,0.03);
    border-top:1px solid rgba(255,255,255,0.06);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color: var(--text-dim);
    z-index:6;
  }
  .hint{
    position:absolute;
    bottom:60px; left:0; right:0;
    text-align:center;
    font-size:11px;
    color: var(--text-dim);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:1px;
    z-index:5;
    pointer-events:none;
    animation: fade 2.4s ease-in-out infinite;
  }
  @keyframes fade{ 0%,100%{opacity:0.35} 50%{opacity:0.9} }
  .loading-row{
    display:flex; gap:6px; justify-content:center; margin-top:14px;
  }
  .dot{ width:6px; height:6px; border-radius:50%; background:var(--text-dim); }
</style>
</head>
<body>
<div id="app">
  <div id="stage-wrap">
    <canvas id="game"></canvas>

    <div class="hud">
      <div class="score" id="scoreDisplay">0</div>
      <div class="lives" id="livesDisplay"></div>
    </div>

    <div class="hint" id="hint">← geser / panah untuk bergerak →</div>

    <div class="overlay" id="startScreen">
      <div class="eyebrow">Arcade &middot; Nova Drift</div>
      <h1>Nova Drift</h1>
      <div class="desc">Kumpulkan pecahan bintang, hindari batu asteroid. Makin lama makin cepat — seberapa jauh kamu bisa bertahan?</div>
      <button class="btn" id="startBtn">Mulai Main</button>
      <div class="board" id="startBoard"></div>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <div class="eyebrow">Misi Berakhir</div>
      <div class="final-label">Skor Kamu</div>
      <div class="final-score" id="finalScore">0</div>
      <input type="text" id="nameInput" placeholder="Nama untuk papan skor" maxlength="14">
      <button class="btn" id="submitBtn">Simpan Skor</button>
      <button class="btn ghost" id="retryBtn">Main Lagi</button>
      <div class="board" id="endBoard"></div>
    </div>

    <div class="ad-slot">Ruang Iklan · 320×50</div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const stageWrap = document.getElementById('stage-wrap');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const livesDisplay = document.getElementById('livesDisplay');
  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const startBtn = document.getElementById('startBtn');
  const retryBtn = document.getElementById('retryBtn');
  const submitBtn = document.getElementById('submitBtn');
  const finalScoreEl = document.getElementById('finalScore');
  const nameInput = document.getElementById('nameInput');
  const startBoard = document.getElementById('startBoard');
  const endBoard = document.getElementById('endBoard');
  const hint = document.getElementById('hint');

  let W, H, DPR;
  function resize(){
    const rect = stageWrap.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = rect.width; H = rect.height;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const LIVES_MAX = 3;
  let state = 'idle'; // idle | playing | over
  let player, stars, rocks, particles, score, lives, speed, spawnTimer, elapsed, lastTime;

  function resetGame(){
    player = { x: W/2, w: 34, h: 34, targetX: W/2 };
    stars = [];
    rocks = [];
    particles = [];
    score = 0;
    lives = LIVES_MAX;
    speed = 1;
    spawnTimer = 0;
    elapsed = 0;
    updateHUD();
  }

  function updateHUD(){
    scoreDisplay.textContent = Math.floor(score);
    livesDisplay.innerHTML = '';
    for(let i=0;i<LIVES_MAX;i++){
      const d = document.createElement('div');
      d.className = 'life' + (i >= lives ? ' lost' : '');
      livesDisplay.appendChild(d);
    }
  }

  // input
  let dragging = false;
  function setTarget(clientX){
    const rect = canvas.getBoundingClientRect();
    let x = clientX - rect.left;
    x = Math.max(20, Math.min(W-20, x));
    player.targetX = x;
  }
  canvas.addEventListener('pointerdown', e=>{ dragging = true; setTarget(e.clientX); });
  window.addEventListener('pointermove', e=>{ if(dragging) setTarget(e.clientX); });
  window.addEventListener('pointerup', ()=> dragging = false);

  const keys = {};
  window.addEventListener('keydown', e=>{
    keys[e.key] = true;
    if(['ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup', e=> keys[e.key] = false);

  function spawnEntity(){
    const isRock = Math.random() < 0.4;
    const x = 24 + Math.random() * (W - 48);
    const size = isRock ? 22 + Math.random()*10 : 14 + Math.random()*6;
    const vy = (1.3 + Math.random()*0.9) * (1 + speed*0.18);
    const entity = { x, y: -size, size, vy, rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.06 };
    if(isRock) rocks.push(entity); else stars.push(entity);
  }

  function addBurst(x,y,color){
    for(let i=0;i<10;i++){
      particles.push({
        x, y, color,
        vx: (Math.random()-0.5)*4,
        vy: (Math.random()-0.5)*4 - 1,
        life: 1
      });
    }
  }

  function circleHit(ax,ay,ar,bx,by,br){
    const dx=ax-bx, dy=ay-by;
    return Math.sqrt(dx*dx+dy*dy) < ar+br;
  }

  function loop(t){
    if(!lastTime) lastTime = t;
    const dt = Math.min((t - lastTime)/16.67, 2.4);
    lastTime = t;

    ctx.clearRect(0,0,W,H);
    drawBackground(t);

    if(state === 'playing'){
      elapsed += dt;
      speed = 1 + elapsed/420;
      score += dt * 0.4 * speed;

      player.x += (player.targetX - player.x) * 0.22;
      if(keys['ArrowLeft']) player.targetX = Math.max(20, player.targetX - 9*dt);
      if(keys['ArrowRight']) player.targetX = Math.min(W-20, player.targetX + 9*dt);

      spawnTimer -= dt;
      if(spawnTimer <= 0){
        spawnEntity();
        spawnTimer = Math.max(16, 34 - speed*4);
      }

      const playerY = H - 74;
      const pr = player.w/2 - 4;

      for(let i=stars.length-1;i>=0;i--){
        const s = stars[i];
        s.y += s.vy * dt; s.rot += s.vr*dt;
        if(circleHit(player.x, playerY, pr, s.x, s.y, s.size/2)){
          score += 15;
          addBurst(s.x, s.y, '255,200,87');
          stars.splice(i,1);
          continue;
        }
        if(s.y - s.size > H) stars.splice(i,1);
      }

      for(let i=rocks.length-1;i>=0;i--){
        const r = rocks[i];
        r.y += r.vy * dt; r.rot += r.vr*dt;
        if(circleHit(player.x, playerY, pr, r.x, r.y, r.size/2)){
          lives -= 1;
          addBurst(r.x, r.y, '255,93,93');
          rocks.splice(i,1);
          updateHUD();
          if(lives <= 0){ endGame(); }
          continue;
        }
        if(r.y - r.size > H) rocks.splice(i,1);
      }

      updateHUD();
      drawPlayer(playerY);
      hint.style.display = elapsed > 200 ? 'none' : 'block';
    }

    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx*dt; p.y += p.vy*dt; p.life -= 0.04*dt;
      if(p.life <= 0){ particles.splice(i,1); continue; }
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = `rgb(${p.color})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,2.4,0,7); ctx.fill();
      ctx.globalAlpha = 1;
    }

    drawEntities(stars, 'star');
    drawEntities(rocks, 'rock');

    requestAnimationFrame(loop);
  }

  function drawBackground(t){
    ctx.fillStyle = 'rgba(0,0,0,0)';
    if(!drawBackground.stars){
      drawBackground.stars = Array.from({length:60}, ()=>({
        x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.4+0.3, tw: Math.random()*Math.PI*2
      }));
    }
    drawBackground.stars.forEach(s=>{
      const a = 0.3 + 0.5*Math.abs(Math.sin(t/900 + s.tw));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#cfe8ff';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawPlayer(y){
    ctx.save();
    ctx.translate(player.x, y);
    const grad = ctx.createRadialGradient(0,0,2,0,0,20);
    grad.addColorStop(0, '#4cd9e8');
    grad.addColorStop(1, 'rgba(76,217,232,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(0,0,20,0,7); ctx.fill();

    ctx.fillStyle = '#e8fbff';
    ctx.beginPath();
    ctx.moveTo(0,-13);
    ctx.lineTo(11,10);
    ctx.lineTo(0,5);
    ctx.lineTo(-11,10);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawEntities(list, type){
    list.forEach(e=>{
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.rot);
      if(type === 'star'){
        ctx.fillStyle = '#ffc857';
        ctx.shadowColor = '#ffc857';
        ctx.shadowBlur = 10;
        drawStarShape(e.size/2);
      } else {
        ctx.fillStyle = '#786a8c';
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1.5;
        drawRockShape(e.size/2);
      }
      ctx.restore();
    });
  }

  function drawStarShape(r){
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const a1 = (i/5)*7 - Math.PI/2;
      const a2 = a1 + Math.PI/5;
      ctx.lineTo(Math.cos(a1)*r, Math.sin(a1)*r);
      ctx.lineTo(Math.cos(a2)*r*0.42, Math.sin(a2)*r*0.42);
    }
    ctx.closePath();
    ctx.fill();
  }

  function drawRockShape(r){
    ctx.beginPath();
    const pts = 7;
    for(let i=0;i<pts;i++){
      const a = (i/pts)*7;
      const rr = r * (0.78 + (i%3)*0.1);
      ctx.lineTo(Math.cos(a)*rr, Math.sin(a)*rr);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  // ---------- Leaderboard (persistent, shared) ----------
  async function loadLeaderboard(){
    try{
      const res = await window.storage.get('novadrift:leaderboard', true);
      if(res && res.value){
        return JSON.parse(res.value);
      }
    }catch(e){}
    return [];
  }

  async function saveScore(name, sc){
    let board = await loadLeaderboard();
    board.push({ name: name || 'Anonim', score: Math.floor(sc), t: Date.now() });
    board.sort((a,b)=> b.score - a.score);
    board = board.slice(0, 20);
    try{
      await window.storage.set('novadrift:leaderboard', JSON.stringify(board), true);
    }catch(e){}
    return board;
  }

  function renderBoard(el, board){
    el.innerHTML = '';
    if(!board.length){
      el.innerHTML = '<div class="board-title">Belum ada skor</div>';
      return;
    }
    const title = document.createElement('div');
    title.className = 'board-title';
    title.textContent = 'Papan Skor Global';
    el.appendChild(title);
    board.slice(0,8).forEach((row, i)=>{
      const r = document.createElement('div');
      r.className = 'board-row' + (i===0 ? ' top' : '');
      r.innerHTML = `<span class="rank">${i+1}</span><span style="flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(row.name)}</span><span>${row.score}</span>`;
      el.appendChild(r);
    });
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  async function refreshBoards(){
    const board = await loadLeaderboard();
    renderBoard(startBoard, board);
    renderBoard(endBoard, board);
  }

  function startGame(){
    resetGame();
    state = 'playing';
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hint.style.display = 'block';
  }

  function endGame(){
    state = 'over';
    finalScoreEl.textContent = Math.floor(score);
    gameOverScreen.classList.remove('hidden');
    hint.style.display = 'none';
    nameInput.value = '';
    refreshBoards();
  }

  startBtn.addEventListener('click', startGame);
  retryBtn.addEventListener('click', startGame);
  submitBtn.addEventListener('click', async ()=>{
    submitBtn.disabled = true;
    submitBtn.textContent = 'Menyimpan...';
    const board = await saveScore(nameInput.value.trim(), score);
    renderBoard(endBoard, board);
    renderBoard(startBoard, board);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Skor Tersimpan';
  });

  resetGame();
  refreshBoards();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
